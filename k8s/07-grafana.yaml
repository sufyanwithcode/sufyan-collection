# ─────────────────────────────────────────────────────────────
#  Grafana — Deployment + Service
# ─────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sc-grafana
  namespace: sufyan-collection
  labels:
    app: sc-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sc-grafana
  template:
    metadata:
      labels:
        app: sc-grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.2.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sc-secrets
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
          resources:
            requests:
              memory: "128Mi"
              cpu:    "100m"
            limits:
              memory: "256Mi"
              cpu:    "200m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds:       30
      volumes:
        - name: grafana-storage
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: sc-grafana-service
  namespace: sufyan-collection
  labels:
    app: sc-grafana
spec:
  selector:
    app: sc-grafana
  ports:
    - port:       3000
      targetPort: 3000
      nodePort:   30300
      name:       web
  type: NodePort
