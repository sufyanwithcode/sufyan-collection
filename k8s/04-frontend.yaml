# ─────────────────────────────────────────────────────────────
#  Tier 1 — React + Nginx Frontend
# ─────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sc-frontend
  namespace: sufyan-collection
  labels:
    app: sc-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sc-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:        1
      maxUnavailable:  0
  template:
    metadata:
      labels:
        app: sc-frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: sufyanwithcode/sc-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu:    "50m"
            limits:
              memory: "128Mi"
              cpu:    "150m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds:       30
            timeoutSeconds:      5
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds:       10
            timeoutSeconds:      5

---
apiVersion: v1
kind: Service
metadata:
  name: sc-frontend-service
  namespace: sufyan-collection
  labels:
    app: sc-frontend
spec:
  selector:
    app: sc-frontend
  ports:
    - protocol: TCP
      port:       80
      targetPort: 80
      nodePort:   30080
      name:       http
  type: NodePort

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sc-frontend-hpa
  namespace: sufyan-collection
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sc-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type:               AverageUtilization
          averageUtilization: 70
