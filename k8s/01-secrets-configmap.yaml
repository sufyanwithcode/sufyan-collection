# ─────────────────────────────────────────────────────────────
#  Secrets  (base64-encode your real values before production)
#  echo -n "your-value" | base64
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: sc-secrets
  namespace: sufyan-collection
type: Opaque
stringData:
  JWT_SECRET: "sufyan_collection_jwt_secret_k8s_2024"
  GRAFANA_ADMIN_PASSWORD: "Grafana@123"

---
# ─────────────────────────────────────────────────────────────
#  ConfigMap — non-sensitive configuration
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: sc-config
  namespace: sufyan-collection
data:
  NODE_ENV:        "production"
  PORT:            "5000"
  JWT_EXPIRE:      "30d"
  FRONTEND_URL:    "http://sc-frontend-service"
  MONGO_URI:       "mongodb://sc-mongo-service:27017/sufyan_collection"
