global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'sufyan-collection'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Sufyan Collection Express API
  - job_name: 'sufyan-collection-api'
    static_configs:
      - targets: ['backend:5000']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout:  8s

  # Node Exporter (optional — add node-exporter service to compose)
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
